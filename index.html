  .legend span{display:inline-flex;align-items:center;gap:6px}
  .sw{width:14px;height:14px;border-radius:3px;display:inline-block}
  .btn{background:var(--teal);color:#fff;border:none;border-radius:6px;padding:6px 12px;font-size:11px;
       letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-weight:700}
  .btn.alt{background:var(--mustard);color:var(--ink)} .btn.ghost{background:transparent;color:var(--cream);border:1px solid var(--cream)}
  .btn.on{background:var(--red)}
  .status{font-size:10px;color:#bcd3d8;letter-spacing:1px;max-width:260px}
  body:not(.editing) .editonly{display:none !important}
  .card{background:var(--paper);border:2px solid var(--line);border-radius:10px;margin-top:16px;overflow:hidden}

  .inner{position:relative}
  .grid-overlay{position:absolute;top:0;bottom:0;pointer-events:none;z-index:2}
  .vline{position:absolute;top:0;bottom:0;width:0}
  .today{border-left:2px solid var(--mustard)} .today .tag{background:var(--mustard);color:var(--ink)}

       border-radius:4px;white-space:nowrap;font-weight:700;max-width:220px;overflow:hidden;text-overflow:ellipsis}
  .mdiam{position:absolute;width:9px;height:9px;background:var(--red);transform:rotate(45deg);left:-5px}
  .row{display:flex;align-items:stretch;border-top:1px solid var(--line);min-height:52px}

  footer{font-size:11px;color:var(--ink2);text-align:center;padding:14px;letter-spacing:.5px}
  .blk{color:var(--red);font-weight:700}
  /* collapsible waiting panel + compact density */
  .waitbar h4{cursor:pointer;user-select:none}
  .waitbar h4::before{content:'\25BE ';font-size:10px}
  .waitbar.collapsed h4::before{content:'\25B8 '}

  body.compact .phases{display:none}
  body.compact .bar{height:15px;font-size:10px}
  body.compact .grouphdr{padding:3px 10px;font-size:10px}
  body.compact .waiting{font-size:9px;padding:1px 6px}
  @media (max-width:760px){
    .wrap{padding:8px}.hmain{flex-direction:column;align-items:flex-start;padding:12px 14px}
    h1{font-size:19px;letter-spacing:2px}.sub{font-size:10px}.legend{gap:8px;font-size:10px}.rightblock{align-items:flex-start}

</style>
</head>

function d(s){ return s ? new Date(s + 'T00:00:00') : null; }
function todayD(){ const t=new Date(); return new Date(t.getFullYear(),t.getMonth(),t.getDate()); }
function addMonths(dt,n){ return new Date(dt.getFullYear(), dt.getMonth()+n, dt.getDate()); }
function monthsBetween(a,b){ return (b.getFullYear()-a.getFullYear())*12 + (b.getMonth()-a.getMonth()); }
function slug(s){ return s.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'').slice(0,40) || ('proj-'+Math.floor(Math.random()*9999)); }
function isoToday(){ return new Date().toISOString().slice(0,10); }
function pinField(p,f){ p.pinned = p.pinned||[]; if(!p.pinned.includes(f)) p.pinned.push(f); }
function el(tag,cls,html){ const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e; }

const T = todayD();
function timeStart(){
  const starts = DATA.projects.map(p=>d(p.start)).filter(Boolean);
  let s = starts.length ? new Date(Math.min.apply(null, starts.map(x=>x.getTime()))) : new Date(T.getFullYear(),0,1);
  return new Date(s.getFullYear(), s.getMonth(), 1);
}
const HORIZON = DATA.horizon_months || 12;

const SEQ = DATA.eDNA_phase_sequence || [];
const PHASESETS = {
  'Lab Data Pipeline': ['Project planning','Field-work planning','Field work','Filtration','Extraction','Lab submission','Data analysis'],
  'Modeling': ['Data analysis','Results finalizing','Manuscript drafting','Co-author review','Journal submission','Published'],
  'Writing & Reporting': ['Data analysis','Results finalizing','Manuscript drafting','Co-author review','Journal submission','Published']
};
function phasesFor(p){
  if(Array.isArray(p.phases) && p.phases.length){
    return p.phases.map(ph=>({name:ph.name, cls: ph.status==='done'?'done':(ph.status==='current'?'cur':'')}));
  }
  const set = PHASESETS[p.category];
  if(!set) return null;
  const doneCount = Math.round((p.percent||0)/100*set.length);
  return set.map((nm,i)=>({name:nm, cls: i<doneCount?'done':(i===doneCount?'cur':'')}));
}
function materialize(p){
  if(!Array.isArray(p.phases) || !p.phases.length){
    const cur = phasesFor(p) || [];
    p.phases = cur.map(x=>({name:x.name, status: x.cls==='done'?'done':(x.cls==='cur'?'current':'upcoming')}));
  }
}
function cyclePhase(p,idx){
  materialize(p);
  const cyc=['upcoming','current','done'];
  const ph=p.phases[idx]; ph.status = cyc[(cyc.indexOf(ph.status)+1)%3];
  pinField(p,'phases'); drawGantt();
}
function addPhase(p,name){
  materialize(p);
  if(!p.phases.some(x=>x.name===name)){
    // insert in canonical order if known, else append
    const order = (DATA.eDNA_phase_sequence||[]);
    const rank = n => { const i=order.indexOf(n); return i<0?999:i; };
    p.phases.push({name, status:'current'});
    p.phases.sort((a,b)=> rank(a.name)-rank(b.name));
  }
  pinField(p,'phases'); drawGantt();
}
function removePhase(p,idx){ materialize(p); p.phases.splice(idx,1); pinField(p,'phases'); drawGantt(); }
const CATS = ['Writing & Reporting','Lab Data Pipeline','Modeling','Automation & Web','Knowledge Base','Bishir (Business)'];
const RANK = {high:0,medium:1,low:2};
function sortKey(p){ return (p.sort!=null) ? p.sort : 100 + (RANK[p.priority]!=null?RANK[p.priority]:9); }
function groupSorted(list){ return list.slice().sort((a,b)=> sortKey(a)-sortKey(b)); }
function moveProj(p,dir){
  const grp = groupSorted(DATA.projects.filter(x=>x.category===p.category));
  const i=grp.indexOf(p), j=i+dir; if(j<0||j>=grp.length) return;
  const t=grp[i]; grp[i]=grp[j]; grp[j]=t; grp.forEach((x,k)=> x.sort=k); drawGantt();
}
function barEnd(p){
  const s=d(p.start), tgt=d(p.target), open = p.status!=='done';
  let e = tgt ? tgt : (open ? T : s);
  if(open && e < T) e = T;
  if(e <= s) e = new Date(s.getTime()+7*DAY);
  return e;
}

function drawGantt(){
  const start = timeStart();
  const end = addMonths(new Date(T.getFullYear(), T.getMonth(), 1), HORIZON+1);
  const totalMonths = monthsBetween(start, end);
  const chartW = totalMonths * MW;
  const span = end.getTime() - start.getTime();
  const x = (dt)=> ((dt.getTime()-start.getTime())/span) * chartW;

  const g = document.getElementById('gantt'); g.innerHTML='';

  const axis = el('div','axis');
  axis.appendChild(el('div','corner','Project'));
  const months = el('div','months'); months.style.width = chartW+'px';
  for(let i=0;i<totalMonths;i++){
    const m = addMonths(start,i);
    const mo = el('div','mo'+(m.getMonth()===0?' jan':''),
      m.toLocaleString('en',{month:'short'}) + (m.getMonth()===0? " '"+String(m.getFullYear()).slice(2):''));
    mo.style.left=(i*MW)+'px'; mo.style.width=MW+'px'; months.appendChild(mo);
  }
  axis.appendChild(months); g.appendChild(axis);

  const inner = el('div','inner');
  const overlay = el('div','grid-overlay'); overlay.style.left=LABEL_W+'px'; overlay.style.width=chartW+'px';
  const tl = el('div','vline today'); tl.style.left=x(T)+'px'; tl.appendChild(el('div','tag','Today')); overlay.appendChild(tl);
  // place deadline labels with greedy anti-overlap: sort by date, stack onto the lowest free level
  const miles = (DATA.milestones||[]).map(m=>({m, md:d(m.date)})).filter(o=>o.md).sort((a,b)=> a.md-b.md);
  const lvlRight=[]; const CW=5.6, PADX=16;
  miles.forEach(o=>{
    const label = o.m.date.slice(5)+' '+o.m.label;
    const leftPx = x(o.md);
    const w = Math.min(label.length*CW + PADX, 232);
    let lvl=0; while(lvlRight[lvl]!=null && lvlRight[lvl] > leftPx-6) lvl++;
    lvlRight[lvl] = leftPx + w;
    const v=el('div','vline mile'); v.style.left=leftPx+'px'; v.appendChild(el('div','mdiam'));
    const tg=el('div','tag', label); tg.style.top=(13+lvl*17)+'px'; v.appendChild(tg);
    overlay.appendChild(v);
  });
  inner.appendChild(overlay);

  const groups = {};
  DATA.projects.forEach(p=>{ (groups[p.category]=groups[p.category]||[]).push(p); });
  const cats = CATS.filter(c=>groups[c]).concat(Object.keys(groups).filter(c=>!CATS.includes(c)));

  cats.forEach(c=>{
    const vis = groupSorted(groups[c].filter(p=> editing || p.tracking!==false));
    if(!vis.length) return;
    const gh = el('div','grouphdr', c); gh.style.width=(LABEL_W+chartW)+'px'; inner.appendChild(gh);
    vis.forEach(p=>{
      const row = el('div','row'+(p.tracking===false?' untracked':''));
      const lab = el('div','rowlabel');
      if(editing){
        const tw = el('label','trkwrap editonly');
        const cb = el('input'); cb.type='checkbox'; cb.checked = p.tracking!==false;
        cb.onchange = ()=>{ p.tracking = cb.checked; drawGantt(); };
        tw.append(cb, document.createTextNode(cb.checked?'tracking':'stopped')); lab.appendChild(tw);
      }
      const nm = el('div','nm', p.name); nm.title=p.name;
      if(editing){ nm.contentEditable='true';
        nm.onblur=()=>{ const t=nm.textContent.trim(); if(t && t!==p.name){ p.name=t; pinField(p,'name'); } };
      }
      lab.appendChild(nm);
      let meta = (p.status||'').toUpperCase() + ' &middot; ' + (p.percent||0) + '%';
      if(p.blocked_on) meta += " &middot; <span class='blk'>BLOCKED</span>";
      lab.appendChild(el('div','meta', meta));
      if(editing){
        const er = el('div','editrow editonly');
        const cs = el('select','catsel'); cs.title='project bin';
        CATS.forEach(cc=> cs.appendChild(new Option(cc,cc)));
        if(!CATS.includes(p.category)) cs.appendChild(new Option(p.category,p.category));
        cs.value = p.category;
        cs.onchange = ()=>{ p.category = cs.value; pinField(p,'category'); delete p.sort; drawGantt(); };
        const ordered = groupSorted(DATA.projects.filter(x=>x.category===p.category));
        const idx = ordered.indexOf(p);
        const up = el('button','ord','&#9650;'); up.title='move up'; up.disabled = idx<=0; up.onclick=()=>moveProj(p,-1);
        const dn = el('button','ord','&#9660;'); dn.title='move down'; dn.disabled = idx>=ordered.length-1; dn.onclick=()=>moveProj(p,1);
        const tg = el('input','tgt'); tg.type='date'; tg.value=p.target||''; tg.title='project end date (bar end)';
        tg.onchange=()=>{ p.target = tg.value||null; pinField(p,'target'); drawGantt(); };
        const adl = el('button','ord adl','+'); adl.title='add a deadline marker for this project';
        adl.onclick=()=>{ DATA.milestones=DATA.milestones||[]; DATA.milestones.push({label:p.name.slice(0,28)+' deadline', date:isoToday(), project:p.id, importance:'high'}); buildDeadlines(); document.getElementById('dpanel').style.display='block'; drawGantt(); };
        er.append(cs,up,dn,tg,adl); lab.appendChild(er);
      }
      const phs = phasesFor(p);
      if(phs || editing){
        const pc = el('div','phases');
        (phs||[]).forEach((ph,pi)=>{
          const sp=el('span','ph '+ph.cls+(editing?' click':''), ph.name);
          if(editing){ sp.title='click: cycle status  |  shift+click: remove'; sp.onclick=(e)=>{ if(e.shiftKey) removePhase(p,pi); else cyclePhase(p,pi); }; }
          pc.appendChild(sp);
        });
        if(editing){
          const present=new Set((phasesFor(p)||[]).map(x=>x.name));
          const sel=el('select','phadd editonly'); sel.appendChild(new Option('+ phase',''));
          (SEQ||[]).forEach(n=>{ if(!present.has(n)) sel.appendChild(new Option(n,n)); });
          sel.onchange=()=>{ if(sel.value) addPhase(p, sel.value); };
          pc.appendChild(sel);
        }
        lab.appendChild(pc);
      }
      if(editing){
        const inp = el('input','pct editonly'); inp.type='number'; inp.min=0; inp.max=100; inp.value=p.percent||0; inp.title='percent complete';
        inp.onchange = ()=>{ p.percent = Math.max(0,Math.min(100,parseInt(inp.value)||0)); pinField(p,'percent'); drawGantt(); };
        lab.appendChild(inp);
      }
      row.appendChild(lab);
      const track = el('div','track'); track.style.width=chartW+'px';
      const s=d(p.start), e=barEnd(p);
      const bar = el('div','bar st-'+(p.status||'active'));
      bar.style.left=x(s)+'px'; bar.style.width=Math.max(6,(x(e)-x(s)))+'px';
      const fill=el('div','fill'); fill.style.width=(p.percent||0)+'%'; bar.appendChild(fill);
      bar.appendChild(el('span',null,(p.percent||0)+'%'));
      bar.title = p.name + ' - ' + (p.next_action||'');
      track.appendChild(bar);
      // "waiting on you" status at the leading edge of the bar (~today)
      if(editing){
        const wi = el('input','waitin editonly'); wi.value=p.waiting_on||''; wi.placeholder='waiting on you...';
        wi.style.left=Math.min(x(e)+6, chartW-256)+'px';
        wi.onchange=()=>{ p.waiting_on = wi.value.trim()||null; pinField(p,'waiting_on'); buildWaiting(); };
        track.appendChild(wi);
      } else if(p.waiting_on){
        const wl = el('div','waiting'); wl.style.left=(x(e)+6)+'px'; wl.textContent=p.waiting_on; wl.title=p.waiting_on;
        track.appendChild(wl);
      }
      row.appendChild(track);
      inner.appendChild(row);
    });
  });
  g.appendChild(inner);
  buildWaiting();
}

function buildDeadlines(){
  const dp=document.getElementById('dpanel'); dp.innerHTML='';
  dp.appendChild(el('h3',null,'Deadlines / milestones &mdash; move one by editing its date'));
  (DATA.milestones=DATA.milestones||[]).forEach((m,idx)=>{
    const r=el('div','drow');
    const dt=el('input'); dt.type='date'; dt.className='dl'; dt.value=m.date; dt.onchange=()=>{ m.date=dt.value; drawGantt(); };
    const lb=el('input'); lb.className='lbl'; lb.value=m.label; lb.onchange=()=>{ m.label=lb.value; drawGantt(); };
    const sel=el('select'); sel.appendChild(new Option('(no project)',''));
    DATA.projects.forEach(p=> sel.appendChild(new Option(p.name, p.id)));
    sel.value=m.project||''; sel.onchange=()=>{ m.project=sel.value||null; };
    const xb=el('button','xbtn','Ã—'); xb.title='remove'; xb.onclick=()=>{ DATA.milestones.splice(idx,1); buildDeadlines(); drawGantt(); };
    r.append(dt,lb,sel,xb); dp.appendChild(r);
  });
  const add=el('button','btn','+ Add deadline');
  add.onclick=()=>{ DATA.milestones.push({label:'New deadline',date:isoToday(),project:null,importance:'high'}); buildDeadlines(); drawGantt(); };
  dp.appendChild(add);
}

function buildWaiting(){
  const wb=document.getElementById('waitbar');
  if(PUBLIC){ wb.style.display='none'; wb.innerHTML=''; return; }
  const projItems = DATA.projects.filter(p=> p.tracking!==false && p.waiting_on);
  DATA.waiting_extra = DATA.waiting_extra || [];
  const extra = DATA.waiting_extra;
  const total = projItems.length + extra.length;
  if(!editing && total===0){ wb.style.display='none'; wb.innerHTML=''; return; }
  wb.style.display='block'; wb.innerHTML='';
  const wh=el('h4',null,'&#9203; Waiting on you ('+total+')');
  wh.onclick=()=>{ const c=wb.classList.toggle('collapsed'); try{ localStorage.setItem('tracker-waitcollapsed', c?'1':'0'); }catch(e){} };
  wb.appendChild(wh);

  if(!editing){
    const ul=el('ul');
    projItems.forEach(p=>{ const li=el('li'); const b=el('b'); b.textContent=p.name+': '; const s=el('span'); s.textContent=p.waiting_on; li.append(b,s); ul.appendChild(li); });
    extra.forEach(t=>{ const li=el('li'); li.textContent=t; ul.appendChild(li); });
    wb.appendChild(ul);
    return;
  }

  // EDIT mode: editable rows (edit / remove) + add
  projItems.forEach(p=>{
    const r=el('div','wrow');
    const lb=el('span','wname'); lb.textContent=p.name+':';
    const inp=el('input','winp'); inp.value=p.waiting_on;
    inp.onchange=()=>{ p.waiting_on = inp.value.trim()||null; pinField(p,'waiting_on'); drawGantt(); };
    const x=el('button','xbtn','Ã—'); x.title='clear this blocker'; x.onclick=()=>{ p.waiting_on=null; pinField(p,'waiting_on'); drawGantt(); };
    r.append(lb,inp,x); wb.appendChild(r);
  });
  extra.forEach((t,idx)=>{
    const r=el('div','wrow');
    const lb=el('span','wname'); lb.textContent='(general):';
    const inp=el('input','winp'); inp.value=t;
    inp.onchange=()=>{ extra[idx]=inp.value; };
    const x=el('button','xbtn','Ã—'); x.title='remove'; x.onclick=()=>{ extra.splice(idx,1); buildWaiting(); };
    r.append(lb,inp,x); wb.appendChild(r);
  });
  const add=el('button','btn','+ Add item');
  add.onclick=()=>{ extra.push('New waiting-on-you item'); buildWaiting(); };
  wb.appendChild(add);
}

function setStatus(t){ document.getElementById('status').textContent = t||''; }

async function save(){
  DATA.generated = isoToday();
  const text = JSON.stringify(DATA, null, 2);
  try{
    if(window.showSaveFilePicker){
      if(!fileHandle){
        fileHandle = await window.showSaveFilePicker({ suggestedName:'projects.json',
          types:[{description:'JSON', accept:{'application/json':['.json']}}] });
      }
      const w = await fileHandle.createWritable(); await w.write(text); await w.close();
      setStatus('Saved to projects.json âœ“  â€” click Run on the "Project Tracker â€” Manual" routine to review & apply.');
    } else { downloadJSON(text); }
  }catch(e){ if(e && e.name==='AbortError'){ setStatus('Save cancelled'); } else { downloadJSON(text); } }
}
function downloadJSON(text){
  const fn = 'projects.edit.' + Date.now() + '.json';   // unique per save so nothing collides/overwrites
  const b=new Blob([text],{type:'application/json'}); const a=document.createElement('a');
  a.href=URL.createObjectURL(b); a.download=fn; a.click();
  setStatus('Saved '+fn+' to Downloads â€” run the manual tracker (/tracker-manual). Every save is kept and merged, so no edit is lost between runs.');
}

function addProject(){
  const name = prompt('New project name?'); if(!name) return;
  const category = prompt('Category? (Writing & Reporting / Lab Data Pipeline / Modeling / Automation & Web / Knowledge Base / Bishir (Business))','Modeling') || 'Modeling';
  DATA.projects.push({ id:slug(name), name, category, status:'active', priority:'medium', percent:0,
    start:isoToday(), target:null, repo:null, next_action:'', blocked_on:null,
    evidence:['manual:added in dashboard'], notes:'', tracking:true, pinned:['name','status','percent'] });
  drawGantt();
}

function toggleEdit(){
  editing = !editing;
  document.body.classList.toggle('editing', editing);
  document.getElementById('editBtn').textContent = editing ? 'Done' : 'Edit';
  document.getElementById('editBtn').classList.toggle('on', editing);
  if(!editing) document.getElementById('dpanel').style.display='none';
  setStatus(editing ? 'Edit mode: change titles, %, phase bubbles, tracking; Deadlines to add/move dates; Save when done.' : '');
  drawGantt();
}

function toggleCompact(){
  const on = document.body.classList.toggle('compact');
  document.getElementById('compactBtn').classList.toggle('on', on);
  try{ localStorage.setItem('tracker-compact', on?'1':'0'); }catch(e){}
}

function init(){
  document.getElementById('subtitle').innerHTML =
    'Updated ' + DATA.generated + '  &middot;  ' + DATA.projects.length + ' projects  &middot;  horizon +' + HORIZON + ' mo';
  document.getElementById('todaybox').textContent =
    'Today: ' + new Date().toLocaleDateString('en', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
  document.getElementById('compactBtn').onclick = toggleCompact;
  try{
    if(localStorage.getItem('tracker-compact')==='1'){ document.body.classList.add('compact'); document.getElementById('compactBtn').classList.add('on'); }
    if(localStorage.getItem('tracker-waitcollapsed')==='1'){ document.getElementById('waitbar').classList.add('collapsed'); }
  }catch(e){}
  if(PUBLIC){
    ['editBtn','addBtn','dlBtn','saveBtn'].forEach(id=>{ const e=document.getElementById(id); if(e) e.remove(); });
  } else {
    document.getElementById('editBtn').onclick = toggleEdit;
    document.getElementById('saveBtn').onclick = save;
    document.getElementById('addBtn').onclick = addProject;
    document.getElementById('dlBtn').onclick = ()=>{
      const dp=document.getElementById('dpanel');
      if(dp.style.display==='none'){ buildDeadlines(); dp.style.display='block'; } else { dp.style.display='none'; }
    };
  }
  document.getElementById('foot').innerHTML =
    'eDNA Ecology Club &middot; Life Aquatic &middot; auto-updates twice weekly &middot; edit + Save writes projects.json (direct save in Chrome/Edge) &middot; bookmark this file';
  drawGantt();
}
init();
</script>
